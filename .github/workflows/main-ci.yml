name: CI — QA Automation Framework

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'
  # Allow manual trigger from the GitHub Actions UI.
  workflow_dispatch:
    inputs:
      browser:
        description: 'Target browser project (leave empty to run all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - chromium
          - firefox
          - webkit
          - api

# Cancel any in-progress run for the same branch to conserve runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node.js version pinned for reproducibility across all jobs.
  NODE_VERSION: '20'
  # Playwright stores browser binaries in a cache directory.
  PLAYWRIGHT_BROWSERS_PATH: '~/.cache/playwright'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & type-check — fast feedback without spinning up browsers.
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run TypeScript compiler (type-check only, no emit)
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: End-to-End browser tests — run in parallel shards per project.
  #
  # IMPORTANT — browser binary mapping:
  #   Playwright project names (chromium, firefox, webkit, mobile-chrome,
  #   mobile-safari) are NOT the same as browser binary install targets.
  #   mobile-chrome  → install chromium
  #   mobile-safari  → install webkit
  #   The resolve-browser step below performs this mapping before installation.
  # ──────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests — ${{ matrix.project }}
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # Do not cancel sibling matrix jobs when one fails — collect all results.
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # ── Browser Binary Name Resolution ────────────────────────────────────
      # Device profile project names (mobile-chrome, mobile-safari) are not
      # valid Playwright install targets. This step resolves the correct
      # underlying browser engine name before caching and installation.
      - name: Resolve browser binary name for project '${{ matrix.project }}'
        id: resolve-browser
        run: |
          PROJECT="${{ matrix.project }}"
          case "$PROJECT" in
            mobile-chrome)  BROWSER="chromium" ;;
            mobile-safari)  BROWSER="webkit"   ;;
            *)              BROWSER="$PROJECT" ;;
          esac
          echo "browser=$BROWSER" >> "$GITHUB_OUTPUT"
          echo "Resolved project '$PROJECT' → browser binary '$BROWSER'"

      # ── Playwright Binary Cache ──────────────────────────────────────────
      # Cache browser binaries between runs using the resolved binary name
      # so that chromium and mobile-chrome share the same cache entry.
      - name: Retrieve Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ steps.resolve-browser.outputs.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ steps.resolve-browser.outputs.browser }}-

      - name: Install Playwright browsers and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ steps.resolve-browser.outputs.browser }}

      - name: Install Playwright system dependencies only (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ steps.resolve-browser.outputs.browser }}

      # ── Test Execution ───────────────────────────────────────────────────
      # E2E tests require a live BASE_URL. When STAGING_BASE_URL is not set,
      # the tests gracefully self-skip via the beforeEach guard in the spec.
      - name: Run E2E tests — ${{ matrix.project }}
        run: npx playwright test tests/e2e/ --project=${{ matrix.project }}
        env:
          BASE_URL:            ${{ secrets.STAGING_BASE_URL }}
          API_BASE_URL:        ${{ secrets.STAGING_API_BASE_URL }}
          TEST_USER_EMAIL:     ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD:  ${{ secrets.TEST_USER_PASSWORD }}
          API_BEARER_TOKEN:    ${{ secrets.API_BEARER_TOKEN }}
          CI:                  'true'

      # ── Artefact Upload ──────────────────────────────────────────────────
      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test result artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}-${{ github.run_id }}
          path: test-results/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: API tests — no browser required, runs on a single runner.
  # The embedded mock server makes this job fully self-contained and requires
  # zero network access or secrets configuration.
  # ──────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests — Geofence & Contract
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # API tests use Playwright's APIRequestContext — no browser binary is
      # launched. We install the Playwright CLI tooling via chromium so the
      # test runner initialises correctly without spinning up any browser.
      - name: Install Playwright CLI tooling (no browser launched during API tests)
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npx playwright test tests/api/ --project=api
        env:
          CI: 'true'
          # No secrets required — the mock server handles all API responses locally.

      - name: Upload API test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload API JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-results-${{ github.run_id }}
          path: test-results/junit-results.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Quality gate — passes only if all parallel test jobs succeeded.
  # "skipped" is treated as a passing outcome for E2E jobs so that the gate
  # does not fail when tests are intentionally skipped due to missing BASE_URL.
  # ──────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    needs:
      - e2e-tests
      - api-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Evaluate test results
        run: |
          E2E_RESULT="${{ needs.e2e-tests.result }}"
          API_RESULT="${{ needs.api-tests.result }}"

          # "skipped" is acceptable for E2E — tests self-skip when BASE_URL is absent.
          # "success" and "skipped" are both green outcomes.
          if [[ "$E2E_RESULT" != "success" && "$E2E_RESULT" != "skipped" ]]; then
            echo "::error::Quality gate failed — E2E Tests: $E2E_RESULT"
            exit 1
          fi

          if [[ "$API_RESULT" != "success" ]]; then
            echo "::error::Quality gate failed — API Tests: $API_RESULT"
            exit 1
          fi

          echo "Quality gate passed."
          echo "  E2E Tests:  $E2E_RESULT"
          echo "  API Tests:  $API_RESULT"
